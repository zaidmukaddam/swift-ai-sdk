# xcodegen spec for the iOS test apps. Regenerate the project with:
#   cd Apps && xcodegen generate
# The same sources also build as macOS windows via `swift run`.
name: SwiftAIApps
options:
  bundleIdPrefix: ai.scira.swiftai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
packages:
  swift-ai-sdk:
    path: ..
targets:
  StreamTextDemo:
    type: application
    platform: iOS
    sources:
      - Sources/StreamTextDemo
    dependencies:
      - package: swift-ai-sdk
        product: AI
    scheme: {}
    info:
      path: Generated/StreamTextDemo-Info.plist
      properties:
        UILaunchScreen: {}
        # The chat app talks to Ollama on the Mac's loopback.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  RealtimeDemo:
    type: application
    platform: iOS
    sources:
      - Sources/RealtimeDemo
    dependencies:
      - package: swift-ai-sdk
        product: AI
    scheme: {}
    info:
      path: Generated/RealtimeDemo-Info.plist
      properties:
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: Your voice streams to the realtime model while the mic is on.
